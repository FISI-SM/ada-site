<nav aria-label="Auxiliary" class="aux-nav">
  <ul class="aux-nav-list">
    {% if site.brand_links %}
      {% for link in site.brand_links %}
        <li class="aux-nav-list-item">
          <a href="{{ link.url }}" class="brand-avatar{% if link.padded %} is-logo{% endif %}" target="_blank" rel="noopener noreferrer"
             aria-label="{{ link.name }}" data-tooltip="{{ link.name }}">
            <img src="{{ link.logo | relative_url }}" alt="{{ link.name }}" loading="lazy">
          </a>
        </li>
      {% endfor %}
    {% else %}
      {% for link in site.aux_links %}
        <li class="aux-nav-list-item">
          <a href="{{ link.last }}" class="site-button"
            {% if site.aux_links_new_tab %}target="_blank" rel="noopener noreferrer"{% endif %}>
            {{ link.first }}
          </a>
        </li>
      {% endfor %}
    {% endif %}
  </ul>
</nav>
