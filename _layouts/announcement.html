<div class="announcement">
  <div class="announcement-head">
    <span class="announcement-ico">{% include icon.html name="megaphone" %}</span>
    <h2>{{ page.title }}</h2>
  </div>
  <span class="announcement-meta">
    {% if page.date %}{{ page.date | date: '%b %e, %Y' }}{% endif %}
    {% assign minutes = content | strip_html | number_of_words | divided_by: 180.0 | round %}
    {% if minutes > 0 %}&middot; {{ minutes }} min read{% endif %}
  </span>
  <div class="announcement-body">
    {{ content }}
  </div>
</div>
