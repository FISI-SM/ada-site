# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole site, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.github_repo }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: ADA - FISI
logo: '/assets/images/sanmarcos.webp'
tagline: Analise and Design of Algorithms
description: Welcome to  ADA Course!
author: Prof. Herminio Paucar Curasma
baseurl: 'ada-site/' # the subpath of your site, e.g. /blog
url: 'https://FISI-SM.github.io/' # the base hostname & protocol for your site, e.g. http://example.com
exclude: ["Gemfile", "Gemfile.lock", "LICENSE", "GUIDE.md"]

# Theme settings
remote_theme: just-the-docs/just-the-docs@v0.7.0
color_scheme: light
search_enabled: true
heading_anchors: true

# Callouts (admonitions) — bloques destacados para notas, tips y avisos
# (sin callouts_level: se adapta automáticamente a claro/oscuro)
callouts:
  info:
    title: Info
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: purple
  warning:
    title: Warning
    color: red
permalink: pretty
aux_links:
  Herminio Paucar C:
    - 'https://hpaucar.github.io'
  FISI:
    - 'https://sistemas.unmsm.edu.pe'
  Universidad Nacional Mayor de San Marcos:
    - 'https://www.unmsm.edu.pe'

# Brand links rendered as circular avatars + tooltips in the top bar
brand_links:
  - name: Herminio Paucar C.
    url: 'https://hpaucar.github.io'
    logo: '/assets/images/herminio.jpg'
  - name: FISI
    url: 'https://sistemas.unmsm.edu.pe'
    logo: '/assets/images/fisi.webp'
  - name: Universidad Nacional Mayor de San Marcos
    url: 'https://www.unmsm.edu.pe'
    logo: '/assets/images/sanmarcos.webp'
    padded: true

footer_content:

# Collections for website data
collections:
  staffers:
  modules:
  schedules:
  announcements:
# Default layouts for each collection type
defaults:
  - scope:
      path: ''
      type: staffers
    values:
      layout: staffer
      height: 300
      subpath: '/assets/images/'
      width: 300
  - scope:
      path: ''
      type: modules
    values:
      layout: module
  - scope:
      path: ''
      type: schedules
    values:
      layout: schedule
  - scope:
      path: ''
      type: announcements
    values:
      layout: announcement

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false
