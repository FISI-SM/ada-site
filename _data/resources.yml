- heading: Past Slides
  icon: slider
  description: >
    This folder contains lecture slides used by the instructor in previous
    Advanced Data Algorithms (ADA) courses at FISI-UNMSM. It is highly
    recommended that you review the corresponding slides before each class so
    you arrive prepared and can use the class time to clarify your questions,
    as the ADA course is rigorous and fast-paced.
  items:
    - title: Slides Drive
      source: ADA course professors 
      url: https://drive.google.com/drive/folders/1VfpWDVilNEa2kw-UpTl4WmkfZ7plUQt5?usp=drive_link
      external: true

- heading: Textbooks
  icon: book
  description: While this course does not explicitly follow a specific textbook, the following are useful references on many of the topics covered.
  items:
    - title: Introduction to Algorithms (4th Edition)
      source: Thomas H. Cormen, Charles E. Leiserson, Ronald L. Rivest & Clifford Stein; MIT Press, 2022
      #url: https://mitpress.mit.edu/9780262046305/introduction-to-algorithms/
      external: true

    - title: Algorithms (4th Edition)
      source: Robert Sedgewick & Kevin Wayne; Addison-Wesley Professional, 2011
      #url: https://algs4.cs.princeton.edu/home/
      external: true

    - title: Algorithm Design
      source: Jon Kleinberg & Éva Tardos; Pearson Addison-Wesley, 2006
      #url: https://www.pearson.com/en-us/subject-catalog/p/algorithm-design/P200000003479
      external: true

    - title: Técnicas de Diseño de Algoritmos
      source: Rosa Guerequeta & Antonio Vallecillo; Universidad de Málaga, 1998
      #url: https://www.lcc.uma.es/
      external: true

    - title: Algorithms
      source: Sanjoy Dasgupta, Christos H. Papadimitriou & Umesh V. Vazirani; McGraw-Hill Higher Education, 2008
      #url: https://algorithmics.lsi.upc.edu/docs/Dasgupta-Papadimitriou-Vazirani.pdf
      external: true

