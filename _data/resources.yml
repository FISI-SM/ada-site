- heading: Textbooks
  icon: book
  description: While this course does not explicitly follow a specific textbook, the following are useful references on many of the topics covered.
  items:
    - title: Dive into Deep Learning
      source: Zhang, Aston, et al.; Cambridge University Press, 2023
      url: https://d2l.ai/index.html
      external: true
    - title: Deep Learning
      source: Goodfellow, Bengio & Courville; MIT Press, 2016
      url: https://www.deeplearningbook.org/
      external: true
    - title: "Deep Learning: Foundations and Concepts"
      source: C. M. Bishop & H. Bishop; Springer, 2024
      url: https://www.bishopbook.com/
      external: true
    - title: Understanding Deep Learning
      source: Simon J. D. Prince; The MIT Press, 2023
      url: https://udlbook.github.io/udlbook/
      external: true
    - title: The Little Book of Deep Learning
      source: François Fleuret; 2023
      url: https://fleuret.org/francois/lbdl.html
      external: true
    - title: Introduction to Neural Network Models of Cognition
      url: https://com-cog-book.github.io/com-cog-book/intro
      external: true

