      answer: false
      explanation: 'False. $3\sqrt{n} + 7n^{1/3}$ is polynomial and grows faster than $n^{0.1}$ (polynomial), so it is not $O$ of it.'
    - type: truefalse
      prompt: '$4(\log n)^4 = O(2^n)$'
      answer: true
      explanation: 'True. $4(\log n)^4$ is polylogarithmic and grows more slowly than $2^n$ (exponential), so the $O$ bound holds.'
    - type: truefalse
      prompt: '$n \cdot \log n = O(\sqrt{n})$'
      answer: false
      explanation: 'False. $n \cdot \log n$ is polynomial times a logarithmic factor and grows faster than $\sqrt{n}$ (polynomial), so it is not $O$ of it.'
