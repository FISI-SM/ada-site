- group: 'Asymptotic notation'
  topic: 'Set 1'
  intro: 'In the following, $\log n$ denotes the base-2 logarithm of $n$. Decide whether each statement is true or false.'
  questions:
    - type: truefalse
      prompt: '$(\log n)^3 = O(n^2)$'
      answer: true
      explanation: 'True. $(\log n)^3$ is polylogarithmic and grows more slowly than $n^2$ (polynomial), so the $O$ bound holds.'
    - type: truefalse
      prompt: '$4\log(n^2) = O(n^{3/2})$'
      answer: true
      explanation: 'True. $4\log(n^2)$ is polylogarithmic and grows more slowly than $n^{3/2}$ (polynomial), so the $O$ bound holds.'
    - type: truefalse
      prompt: '$n^2 + 3\log n = O(\log n)$'
      answer: false
      explanation: 'False. $n^2 + 3\log n$ is polynomial and grows faster than $\log n$ (polylogarithmic), so it is not $O$ of it.'
    - type: truefalse
      prompt: '$n^2 = O(n)$'
      answer: false
      explanation: 'False. $n^2$ is polynomial and grows faster than $n$ (polynomial), so it is not $O$ of it.'
    - type: truefalse
      prompt: '$2n \cdot \log n = O(2^n)$'
      answer: true
      explanation: 'True. $2n \cdot \log n$ is polynomial times a logarithmic factor and grows more slowly than $2^n$ (exponential), so the $O$ bound holds.'
    - type: truefalse
