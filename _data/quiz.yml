- group: 'Sorting'
  topic: 'Concepts'
  intro: 'Conceptual questions about classic sorting algorithms.'
  questions:
    - type: single
      prompt: 'What is the worst-case running time of Quicksort (with a fixed pivot choice)?'
      options:
        - text: '$\Theta(n^2)$'
          correct: true
          feedback: 'Correct: if the pivot is always the minimum or maximum (e.g. an already-sorted array), the partitions have size $n-1$, giving $\Theta(n^2)$.'
        - text: '$\Theta(n\log n)$'
          correct: false
          feedback: 'That is the average case (and best case) of Quicksort, not the worst.'
        - text: '$\Theta(n)$'
          correct: false
          feedback: 'No comparison-based algorithm sorts in linear time in the worst case.'
        - text: '$\Theta(\log n)$'
          correct: false
          feedback: 'Impossible: you must examine all $n$ elements at least once.'
    - type: single
      prompt: 'What is the worst-case running time of Merge sort?'
      options:
        - text: '$\Theta(n\log n)$'
          correct: true
          feedback: 'Correct: Merge sort always splits in half and merges in $\Theta(n)$, giving $\Theta(n\log n)$ in all cases.'
        - text: '$\Theta(n^2)$'
          correct: false
          feedback: 'Merge sort does not degrade to quadratic; its recurrence $2T(n/2)+n$ is always $\Theta(n\log n)$.'
        - text: '$\Theta(n)$'
          correct: false
          feedback: 'The merge phase is $\Theta(n)$, but it is repeated across $\log n$ levels.'
        - text: '$\Theta(n^2\log n)$'
          correct: false
          feedback: 'This greatly overestimates the cost of Merge sort.'
    - type: single
      prompt: 'Which of these sorting algorithms is stable (preserves the relative order of equal elements)?'
      options:
        - text: 'Merge sort'
          correct: true
          feedback: 'Correct: when merging, choosing the element from the left half on ties preserves the relative order.'
        - text: 'Heapsort'
          correct: false
          feedback: 'Heapsort is not stable: the heap operations reorder equal elements.'
        - text: 'Quicksort (in-place)'
          correct: false
          feedback: 'In-place Quicksort partitioning swaps elements and does not preserve relative order.'
        - text: 'Selection sort'
          correct: false
          feedback: 'Classic Selection sort is not stable: long-distance swaps disturb the order of equal elements.'
    - type: single
      prompt: 'What is the worst-case running time of Heapsort?'
      options:
        - text: '$\Theta(n\log n)$'
          correct: true
          feedback: 'Correct: building the heap is $\Theta(n)$ and the $n$ extractions cost $\Theta(\log n)$ each.'
        - text: '$\Theta(n^2)$'
          correct: false
          feedback: 'That is the worst case of algorithms like Quicksort or Insertion sort, not Heapsort.'
        - text: '$\Theta(n)$'
          correct: false
          feedback: 'Building the heap is $\Theta(n)$, but the extractions add a $\log n$ factor.'
        - text: '$\Theta(n\log^2 n)$'
          correct: false
          feedback: 'Each heap operation is $\Theta(\log n)$, not $\Theta(\log^2 n)$.'
    - type: single
      prompt: 'What is the lower bound for sorting $n$ elements by comparisons?'
      options:
        - text: '$\Omega(n\log n)$'
          correct: true
          feedback: 'Correct: the decision tree has $n!$ leaves, and its height is $\Omega(\log(n!)) = \Omega(n\log n)$.'
        - text: '$\Omega(n)$'
          correct: false
          feedback: 'Reading the input is $\Omega(n)$, but the comparison lower bound is stronger: $\Omega(n\log n)$.'
        - text: '$\Omega(n^2)$'
          correct: false
          feedback: 'Too strong: Merge sort achieves $O(n\log n)$, contradicting that bound.'
        - text: '$\Omega(\log n)$'
          correct: false
          feedback: 'Too weak: it does not even suffice to read all $n$ elements.'
    - type: single
      prompt: 'Counting sort on $n$ integers in the range $[0, k]$ runs in:'
      options:
        - text: '$\Theta(n + k)$'
          correct: true
          feedback: 'Correct: it scans the $n$ elements and a counting array of size $k$, with no comparisons.'
        - text: '$\Theta(n\log n)$'
          correct: false
          feedback: 'Counting sort does not compare elements, so it avoids the $\Omega(n\log n)$ bound.'
        - text: '$\Theta(n\log k)$'
          correct: false
          feedback: 'The counting array is scanned linearly in $k$, not logarithmically.'
        - text: '$\Theta(nk)$'
          correct: false
          feedback: 'The $n$ and $k$ factors are added (two separate scans), not multiplied.'
    - type: single
      prompt: 'What is the best case of Insertion sort (for example, on an already-sorted array)?'
      options:
        - text: '$\Theta(n)$'
          correct: true
          feedback: 'Correct: with sorted input, each element is compared once with its predecessor, giving $\Theta(n)$.'
        - text: '$\Theta(n\log n)$'
          correct: false
          feedback: 'Insertion sort uses no recursive splitting; its best case is linear.'
        - text: '$\Theta(n^2)$'
          correct: false
          feedback: 'That is the worst case (reverse-order input), not the best.'
        - text: '$\Theta(1)$'
          correct: false
          feedback: 'Even when sorted, you must scan all $n$ elements to verify it.'
    - type: single
      prompt: 'Radix sort of $n$ numbers with $d$ digits in base $b$ (using a stable per-digit sort) costs:'
      options:
        - text: '$\Theta(d\,(n + b))$'
          correct: true
          feedback: 'Correct: it makes $d$ passes and each is a counting sort of cost $\Theta(n + b)$.'
        - text: '$\Theta(n\log n)$'
          correct: false
          feedback: 'Radix sort does not compare elements; its cost depends on $d$ and $b$, not $\log n$.'
        - text: '$\Theta(d\,n\log n)$'
          correct: false
          feedback: 'Each pass uses counting sort ($\Theta(n+b)$), not a comparison sort.'
        - text: '$\Theta(n + b)$'
          correct: false
          feedback: 'The factor $d$ is missing: one pass is made per each of the $d$ digits.'
